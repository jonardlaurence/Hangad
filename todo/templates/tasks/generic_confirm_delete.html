{% extends 'base.html' %}

{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center p-4">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <div class="mb-4 text-danger">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-exclamation-circle" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                        <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
                    </svg>
                </div>
                
                <h3 class="fw-bold mb-3 text-dark">Delete {{ object_name|default:"Item" }}?</h3>
                <p class="text-secondary mb-5">Are you sure you want to delete this {{ object_name|default:"item"|lower }}? This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ request.META.HTTP_REFERER|default:'javascript:history.back()' }}" class="btn btn-light btn-lg px-4 rounded-3 fw-medium">Cancel</a>
                        <button type="submit" class="btn btn-danger btn-lg px-4 rounded-3 fw-medium">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
